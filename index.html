    const { useState, useEffect, useMemo } = React;

    const programs = [
      { icon:'school', title:'Pendidikan Unggul', desc:'Meningkatkan akses dan kualitas pendidikan untuk semua lapisan masyarakat melalui beasiswa, pelatihan guru, dan infrastruktur sekolah modern di seluruh pelosok nusantara.', g:'program-g1', tag:'Pendidikan' },
      { icon:'health_and_safety', title:'Kesehatan Rakyat', desc:'Memperluas layanan kesehatan gratis, membangun puskesmas modern, dan memastikan ketersediaan obat-obatan esensial di seluruh Indonesia.', g:'program-g2', tag:'Kesehatan' },
      { icon:'agriculture', title:'Ketahanan Pangan', desc:'Mendorong swasembada pangan nasional melalui modernisasi pertanian, irigasi, dan subsidi pupuk bagi petani kecil demi kemandirian bangsa.', g:'program-g3', tag:'Pertanian' },
      { icon:'factory', title:'Industrialisasi', desc:'Membangun kawasan industri strategis untuk menyerap jutaan tenaga kerja dan meningkatkan nilai ekspor produk dalam negeri.', g:'program-g4', tag:'Industri' },
      { icon:'security', title:'Pertahanan Negara', desc:'Memperkuat alutsista dan profesionalisme TNI/Polri demi menjaga kedaulatan wilayah NKRI dari ancaman dalam maupun luar negeri.', g:'program-g5', tag:'Pertahanan' },
      { icon:'solar_power', title:'Energi Terbarukan', desc:'Mewujudkan transisi energi nasional menuju sumber energi bersih dan terbarukan untuk masa depan yang berkelanjutan dan ramah lingkungan.', g:'program-g6', tag:'Lingkungan' },

    const agendas = [
      { date:'05', month:'Jul', year:'2026', title:'Dialog Kebangsaan Bersama Tokoh Masyarakat', location:'Gedung Sate, Bandung', type:'Dialog', color:'bg-red-600' },

      { date:'19', month:'Jul', year:'2026', title:'Kunjungan Kerja ke Kawasan Industri Batam', location:'Kawasan Industri, Batam', type:'Kunjungan', color:'bg-emerald-700' },
      { date:'26', month:'Jul', year:'2026', title:'Forum Ekonomi Rakyat Indonesia Timur', location:'Ballroom Hotel Makassar', type:'Forum', color:'bg-amber-600' },

      { date:'09', month:'Agu', year:'2026', title:'Peresmian RSUD Modern di Papua', location:'Jayapura, Papua', type:'Peresmian', color:'bg-cyan-700' },
    ];

    const timeline = [
      { year:'2024–Sekarang', role:'Presiden Republik Indonesia', desc:'Memimpin Indonesia menuju kemajuan dan kesejahteraan yang merata.' },
      { year:'2019–2024', role:'Menteri Pertahanan RI', desc:'Memperkuat alutsista dan modernisasi sistem pertahanan nasional.' },
      { year:'2018–2019', role:'Calon Presiden RI', desc:'Berpasangan sebagai calon presiden dalam Pemilu 2019.' },
      { year:'2014–2019', role:'Ketua Umum Partai', desc:'Memimpin partai dan menjadi oposisi konstruktif di parlemen.' },
      { year:'1997–2000', role:'Panglima Kostrad', desc:'Memimpin Komando Cadangan Strategis Angkatan Darat.' },
      { year:'1979', role:'Lulus Akademi Militer Magelang', desc:'Memulai karier militer dengan penghargaan tertinggi.' },
    ];

    const skills = [
      { label:'Kepemimpinan', value:96 },
      { label:'Diplomasi', value:88 },
      { label:'Strategi Pertahanan', value:94 },
      { label:'Ekonomi Rakyat', value:85 },
      { label:'Komunikasi Publik', value:90 },
    ];

    // Berita dummy
    const beritaData = [
      { id:1, title:'Presiden Resmikan Program Beasiswa Nasional 2026 untuk 10.000 Mahasiswa', category:'Pendidikan', date:'12 Juli 2026', image:'https://images.pexels.com/photos/5212345/pexels-photo-5212345.jpeg', excerpt:'Program ini memberikan akses pendidikan tinggi bagi putra-putri terbaik dari keluarga kurang mampu di seluruh Indonesia, dengan total anggaran Rp 2,5 triliun.', content:'Dalam acara yang berlangsung di Istora Senayan, Presiden secara resmi meluncurkan Program Beasiswa Nasional 2026. Program ini menjangkau 10.000 mahasiswa baru dari berbagai daerah, dengan priorutama pada bidang sains, teknologi, dan pendidikan guru. Para penerima beasiswa akan mendapatkan biaya kuliah penuh, uang saku, serta bimbingan karir selama 4 tahun. Presiden menyatakan bahwa investasi di bidang pendidikan adalah kunci utama untuk mencetak generasi emas Indonesia di masa depan.', tag:'Pendidikan' },
      { id:2, title:'Kunjungan Kerja ke Kawasan Industri Batam: Target Ekspor Meningkat 30%', category:'Ekonomi', date:'10 Juli 2026', image:'https://images.pexels.com/photos/3184418/pexels-photo-3184418.jpeg', excerpt:'Presiden meninjau langsung perkembangan kawasan industri di Batam dan menargetkan peningkatan ekspor hingga 30% pada akhir tahun 2026 melalui optimalisasi kawasan ekonomi khusus.', content:'Kunjungan ke Batam ini merupakan bagian dari strategi nasional untuk memperkuat sektor manufaktur dan ekspor. Presiden berinteraksi dengan para pelaku industri, membahas insentif fiskal, kemudahan perizinan, dan pengembangan SDM. Dengan adanya kawasan ekonomi khusus yang terus diperluas, diharapkan investasi asing dan domestik semakin deras masuk, menciptakan lapangan kerja baru bagi masyarakat setempat.', tag:'Ekonomi' },
      { id:3, title:'Dialog Kebangsaan di Gedung Sate: Memperkuat Persatuan di Tengah Perbedaan', category:'Politik', date:'07 Juli 2026', image:'https://images.pexels.com/photos/3184639/pexels-photo-3184639.jpeg', excerpt:'Acara dialog yang dihadiri oleh tokoh agama, akademisi, dan masyarakat sipil ini membahas pentingnya moderasi beragama dan toleransi sebagai pilar utama keutuhan NKRI.', content:'Gedung Sate menjadi saksi dialog kebangsaan yang hangat antara Presiden dan berbagai elemen masyarakat. Dalam forum ini, ditekankan bahwa perbedaan adalah kekayaan bangsa yang harus dikelola dengan bijak. Presiden mengajak seluruh komponen bangsa untuk menjadikan Pancasila sebagai bintang penuntun dalam setiap langkah kebangsaan. Dialog ini juga menghasilkan rekomendasi untuk penguatan pendidikan karakter dan wawasan kebangsaan di sekolah-sekolah.', tag:'Politik' },
      { id:4, title:'Peluncuran Program Ketahanan Pangan di Jawa Timur: Swasembada Beras 2027', category:'Pangan', date:'05 Juli 2026', image:'https://images.pexels.com/photos/235725/pexels-photo-235725.jpeg', excerpt:'Presiden meluncurkan program pertanian terpadu di Jawa Timur yang menargetkan swasembada beras nasional pada tahun 2027 melalui modernisasi irigasi dan bantuan alat pertanian.', content:'Di tengah lahan pertanian yang subur, Presiden meresmikan program pertanian terpadu yang melibatkan petani, koperasi, dan dinas pertanian setempat. Program ini mencakup pembangunan jaringan irigasi baru, penyediaan pupuk subsidi, dan pelatihan pertanian presisi. Dengan adanya modernisasi pertanian, diharapkan produktivitas padi meningkat signifikan dan Indonesia tidak lagi bergantung pada impor beras.', tag:'Pangan' },
      { id:5, title:'Peresmian RSUD Modern di Papua: Layanan Kesehatan Setara dengan Rumah Sakit Internasional', category:'Kesehatan', date:'02 Juli 2026', image:'https://images.pexels.com/photos/263402/pexels-photo-263402.jpeg', excerpt:'Rumah Sakit Umum Daerah baru di Jayapura dilengkapi dengan fasilitas medis canggih dan tenaga kesehatan terlatih, menjawab kebutuhan layanan kesehatan berkualitas di wilayah timur Indonesia.', content:'Peresmian RSUD Modern di Papua menjadi tonggak penting dalam pemerataan layanan kesehatan. Rumah sakit ini memiliki 300 tempat tidur, ruang operasi modern, laboratorium lengkap, dan unit gawat darurat 24 jam. Presiden menegaskan bahwa tidak ada lagi alasan bagi masyarakat Papua untuk mendapatkan layanan kesehatan yang layak. Kehadiran RSUD ini juga diharapkan menjadi pusat rujukan bagi wilayah sekitarnya.', tag:'Kesehatan' },
      { id:6, title:'Forum Ekonomi Rakyat Indonesia Timur: Dorong Pertumbuhan Inklusif', category:'Ekonomi', date:'29 Juni 2026', image:'https://images.pexels.com/photos/3182759/pexels-photo-3182759.jpeg', excerpt:'Forum ini mempertemukan pelaku UMKM, koperasi, dan perbankan untuk merumuskan strategi percepatan ekonomi rakyat di kawasan Indonesia Timur yang selama ini tertinggal.', content:'Bertempat di Makassar, Forum Ekonomi Rakyat ini menghasilkan 12 rekomendasi kebijakan, di antaranya kemudahan akses kredit bagi UMKM, penguatan rantai pasok lokal, serta pengembangan pariwisata berbasis masyarakat. Presiden menekankan pentingnya pertumbuhan yang inklusif, di mana setiap warga negara merasakan manfaat pembangunan, bukan hanya segelintir elit.', tag:'Ekonomi' },
      { id:7, title:'Rapat Koordinasi Nasional Ketahanan Pangan: Antisipasi Krisis Pangan Global', category:'Pangan', date:'26 Juni 2026', image:'https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg', excerpt:'Pemerintah pusat dan daerah bersinergi menyusun langkah-langkah strategis menghadapi potensi krisis pangan global yang dipicu oleh perubahan iklim dan konflik internasional.', content:'Rapat koordinasi yang dipimpin langsung oleh Presiden ini mengumpulkan menteri terkait, gubernur, dan kepala dinas pertanian dari seluruh provinsi. Hasil rapat menetapkan 5 program prioritas: perluasan lahan tanam, peningkatan produktivitas pertanian, penguatan cadangan beras nasional, diversifikasi pangan lokal, dan pengendalian harga pangan di pasaran. Semua pihak sepakat bahwa ketahanan pangan adalah isu kedaulatan yang tidak bisa ditawar.', tag:'Pangan' },
      { id:8, title:'Kunjungan ke Pusat Energi Terbarukan di NTT: Indonesia Menuju Net Zero 2060', category:'Lingkungan', date:'23 Juni 2026', image:'https://images.pexels.com/photos/414837/pexels-photo-414837.jpeg', excerpt:'Presiden mengunjungi pembangkit listrik tenaga surya dan angin di Nusa Tenggara Timur sebagai bukti komitmen Indonesia dalam transisi energi menuju emisi nol bersih pada tahun 2060.', content:'Di NTT, Presiden menyaksikan langsung pengoperasian PLTS dan PLTB yang menjadi proyek percontohan energi terbarukan di wilayah timur. Kapasitas terpasang mencapai 200 MW, cukup untuk memenuhi kebutuhan listrik 150.000 rumah tangga. Presiden menyatakan bahwa Indonesia memiliki potensi besar di bidang energi terbarukan dan akan terus mendorong investasi hijau. Target net zero 2060 bukan sekadar wacana, tetapi komitmen nyata yang diwujudkan melalui proyek-proyek strategis nasional.', tag:'Lingkungan' },
      { id:9, title:'Resmikan Pabrik Pengolahan Kelapa Sawit Ramah Lingkungan di Riau', category:'Industri', date:'20 Juni 2026', image:'https://images.pexels.com/photos/3184360/pexels-photo-3184360.jpeg', excerpt:'Pabrik baru ini menerapkan teknologi hijau yang mengurangi emisi karbon dan limbah, sekaligus meningkatkan nilai tambah produk kelapa sawit di pasar global.', content:'Pabrik pengolahan kelapa sawit di Riau ini merupakan hasil kerja sama antara BUMN dan investor asing. Dengan kapasitas 500 ton per hari, pabrik ini tidak hanya meningkatkan produksi minyak sawit berkualitas tinggi, tetapi juga menghasilkan turunan produk seperti biodiesel, kosmetik, dan bahan baku makanan. Presiden menekankan pentingnya hilirisasi industri untuk menciptakan lapangan kerja dan meningkatkan devisa negara.', tag:'Industri' },
      { id:10, title:'Peringatan Hari Kebangkitan Nasional: Api Semangat Persatuan', category:'Politik', date:'17 Juni 2026', image:'https://images.pexels.com/photos/3184465/pexels-photo-3184465.jpeg', excerpt:'Dalam pidato kenegaraan di peringatan Hari Kebangkitan Nasional, Presiden mengajak seluruh rakyat untuk kembali menggali semangat persatuan dan gotong royong yang menjadi ciri khas bangsa Indonesia.', content:'Di hadapan ribuan peserta upacara di Istana Merdeka, Presiden menyampaikan pidato yang menggugah semangat kebangsaan. Ia mengingatkan bahwa kemerdekaan dan kemajuan Indonesia tidak pernah tercapai tanpa kerja sama dan persatuan. Di era globalisasi dan disrupsi teknologi, nilai-nilai kebangsaan harus tetap menjadi filter utama. Peringatan ini juga diisi dengan pemberian penghargaan kepada tokoh-tokoh yang telah berjasa dalam pembangunan nasional.', tag:'Politik' },
      { id:11, title:'Kerja Sama dengan Korea Selatan untuk Pengembangan Teknologi AI di Indonesia', category:'Pendidikan', date:'14 Juni 2026', image:'https://images.pexels.com/photos/256658/pexels-photo-256658.jpeg', excerpt:'Indonesia dan Korea Selatan menandatangani nota kesepahaman di bidang riset dan pengembangan kecerdasan buatan (AI) yang akan melibatkan 10 universitas terkemuka di tanah air.', content:'Nota kesepahaman ini merupakan tindak lanjut dari kunjungan kenegaraan Presiden ke Korea Selatan tahun lalu. Melalui kerja sama ini, Indonesia akan mendapatkan transfer teknologi, pelatihan bagi 1.000 insinyur AI, dan pembangunan pusat riset AI di Bandung dan Surabaya. Presiden optimis bahwa kolaborasi ini akan mempercepat transformasi digital Indonesia dan menciptakan inovasi-inovasi baru di berbagai sektor.', tag:'Pendidikan' },
      { id:12, title:'Gerakan Nasional Sejuta Pohon: Langkah Konkret Menyelamatkan Lingkungan', category:'Lingkungan', date:'10 Juni 2026', image:'https://images.pexels.com/photos/60013/pexels-photo-60013.jpeg', excerpt:'Gerakan ini mengajak masyarakat, pelajar, dan aparatur pemerintah untuk menanam 1 juta pohon dalam satu bulan sebagai upaya mitigasi perubahan iklim dan rehabilitasi hutan.', content:'Dimulai dari kawasan hutan lindung di Kalimantan, Gerakan Nasional Sejuta Pohon menjadi program unggulan Presiden di bidang lingkungan. Selain menanam pohon, gerakan ini juga mengedukasi masyarakat tentang pentingnya menjaga hutan dan lahan kritis. Presiden menargetkan bahwa dalam 5 tahun ke depan, Indonesia akan memiliki tambahan hutan seluas 2 juta hektar melalui program ini. Langkah ini sejalan dengan komitmen Indonesia dalam Perjanjian Paris untuk mengurangi emisi karbon.', tag:'Lingkungan' }
    ];

    const beritaCategories = ['Semua', ...new Set(beritaData.map(b => b.category))];
    const categoryColors = {
      'Pendidikan': 'bg-blue-600',
      'Ekonomi': 'bg-emerald-600',
      'Politik': 'bg-red-600',
      'Pangan': 'bg-amber-600',
      'Kesehatan': 'bg-cyan-600',
      'Lingkungan': 'bg-green-600',
      'Industri': 'bg-purple-600',
    };
    const getColor = (cat) => categoryColors[cat] || 'bg-neutral-600';

    /* ─── NAVBAR ─── */
    function Navbar({ page, setPage }) {
      const [scrolled, setScrolled] = useState(false);
      const [mobileOpen, setMobileOpen] = useState(false);
      const [searchOpen, setSearchOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const go = (p) => {
        setPage(p);
        setMobileOpen(false);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'navbar-glass shadow-2xl' : 'bg-black bg-opacity-75'}`}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <button onClick={() => go('beranda')} className="bg-white rounded-sm px-3 py-1 flex items-center">
                <span className="signature text-black text-xl tracking-tight">Asep ZM</span>
              </button>

              <div className="hidden md:flex items-center gap-8">
                {PAGES.map(p => (
                  <button key={p} onClick={() => go(p)} className={`nav-link text-sm font-medium text-white ${page === p ? 'active' : ''}`}>
                    {NAV_LABELS[p]}
                  </button>
                ))}
              </div>

              <div className="flex items-center gap-3">
                <div className="hidden md:flex items-center">
                  {searchOpen && (
                    <input autoFocus placeholder="Cari..." onBlur={() => setSearchOpen(false)}
                      className="bg-neutral-800 text-white text-sm rounded-l px-3 py-1.5 w-40 border border-neutral-700 border-r-0 focus:outline-none" />
                  )}
                  <button onClick={() => setSearchOpen(!searchOpen)}
                    className="bg-red-600 hover:bg-red-700 text-white p-1.5 rounded transition-colors">
                    <span className="material-icons text-lg leading-none">search</span>
                  </button>
                </div>
                <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden flex flex-col gap-1.5 p-1">
                  <span className={`hamburger-line ${mobileOpen ? 'rotate-45 translate-y-2' : ''}`}></span>
                  <span className={`hamburger-line ${mobileOpen ? 'opacity-0' : ''}`}></span>
                  <span className={`hamburger-line ${mobileOpen ? '-rotate-45 -translate-y-2' : ''}`}></span>
                </button>
              </div>
            </div>

            <div className={`mobile-menu md:hidden ${mobileOpen ? 'open' : 'closed'}`}>
              <div className="py-3 border-t border-neutral-800 flex flex-col gap-1">
                {PAGES.map(p => (
                  <button key={p} onClick={() => go(p)}
                    className={`text-left px-3 py-2.5 text-sm font-medium rounded transition-colors ${page === p ? 'text-red-500 bg-red-950 bg-opacity-40' : 'text-white hover:bg-neutral-800'}`}>
                    {NAV_LABELS[p]}

    function Masukan() {

      const [errors, setErrors] = useState({});

      const validate = () => {
        const e = {};
        if (!form.nama.trim()) e.nama = 'Nama wajib diisi';
        if (!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = 'Email tidak valid';
        if (!form.topik) e.topik = 'Silakan pilih topik';
        if (form.pesan.trim().length < 10) e.pesan = 'Pesan minimal 10 karakter';
        return e;

      const submit = (ev) => {
        ev.preventDefault();
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        setSubmitted(true);

            <div className="border-t border-neutral-800 pt-6 flex flex-col sm:flex-row justify-between items-center gap-3 text-xs">
              <p>&copy; 2026 Asep Zaenal Mustofa. Seluruh hak cipta dilindungi.</p>
              <p>Dibuat dengan <span className="text-red-500">&#9829;</span> untuk Indonesia</p>
            </div>
          </div>
        </footer>
      );
    }

    /* ─── SCROLL TO TOP ─── */
    function ScrollToTop() {
      const [show, setShow] = useState(false);
      useEffect(() => {
        const handleScroll = () => setShow(window.scrollY > 400);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);
      if (!show) return null;
      return (
        <button onClick={() => window.scrollTo({ top:0, behavior:'smooth' })}
          className="fixed bottom-6 right-6 z-50 bg-red-600 hover:bg-red-700 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-xl transition-colors"
          aria-label="Kembali ke atas">
          <span className="material-icons leading-none">keyboard_arrow_up</span>
        </button>
      );
    }

    /* ─── APP ROOT ─── */
    function App() {
      const [page, setPage] = useState('beranda');
      const views = {
        beranda: <Beranda setPage={setPage} />,
        tentang: <Tentang />,
        program: <Program />,
        agenda: <Agenda />,
        berita: <Berita />,
        masukan: <Masukan />
      };
      return (
        <>
          <Navbar page={page} setPage={setPage} />
          <main>{views[page]}</main>
          <Footer setPage={setPage} />
          <ScrollToTop />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
